<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios - Carrera 5K</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <h1>Registro para la Carrera 5K</h1>

    <form action="#" method="post">

        <label for="name">Nombre completo:</label>
        <input type="text" id="name" name="name" placeholder="Ingresa tu nombre completo" required>

        <label for="age">Edad:</label>
        <input type="number" id="age" name="age" placeholder="Ingresa tu edad" min="1" required>

        <label for="size">Talla de camiseta:</label>
        <select id="size" name="size" required>
            <option value="">Selecciona una talla</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
        </select>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

        <label for="phone">Número de teléfono:</label>
        <input type="tel" id="phone" name="phone" placeholder="10 dígitos" pattern="[0-9]{10}" required>

        <br><br>

        <button type="submit">Registrar</button>
        <button type="reset">Limpiar</button>

        <script src="jsvalidator.js"></script>
    </form>

</body>
</html>
